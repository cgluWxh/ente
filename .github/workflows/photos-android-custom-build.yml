name: "Build Photos Android Custom"

on:
    push:
        paths:
            - ".github/workflows/photos-android-custom-build.yml"
            - "mobile/apps/photos/**"
            - "mobile/packages/**"
            - "rust/apps/codegen/**"
            - "rust/bindings/frb/**"
            - "rust/Cargo.lock"
            - "rust/Cargo.toml"
            - "rust/crates/core/**"
            - "rust/crates/image/**"
            - "rust/crates/photos/**"
    workflow_dispatch:
        inputs:
            endpoint:
                description: "API endpoint to compile into the APK"
                required: true
                default: "https://ente.831.moe"
                type: string
            build_mode:
                description: "APK build mode"
                required: true
                default: "debug"
                type: choice
                options:
                    - debug
                    - release

env:
    FLUTTER_VERSION: "3.38.10"
    CUSTOM_ENDPOINT: ${{ github.event.inputs.endpoint || 'https://ente.831.moe' }}
    BUILD_MODE: ${{ github.event.inputs.build_mode || 'debug' }}

permissions:
    contents: read

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    build-android:
        runs-on: ubuntu-latest

        defaults:
            run:
                working-directory: mobile/apps/photos

        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup JDK 17
              uses: actions/setup-java@v5
              with:
                  distribution: "temurin"
                  java-version: "17"

            - name: Install Flutter ${{ env.FLUTTER_VERSION }}
              uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
              with:
                  channel: "stable"
                  flutter-version: ${{ env.FLUTTER_VERSION }}
                  cache: true

            - name: Resolve dependencies with lockfile enforcement
              run: flutter pub get --enforce-lockfile

            - name: Generate Rust bindings
              run: cargo codegen frb
              working-directory: rust

            - name: Create artifacts directory
              run: mkdir -p artifacts

            - name: Add release keystore
              if: env.BUILD_MODE == 'release'
              run: printf '%s' "${SIGNING_KEY_PHOTOS}" | base64 -d > "$RUNNER_TEMP/ente_photos_key.jks"
              env:
                  SIGNING_KEY_PHOTOS: ${{ secrets.SIGNING_KEY_PHOTOS }}

            - name: Build debug independent APK
              if: env.BUILD_MODE == 'debug'
              run: |
                  flutter build apk \
                    --debug \
                    --flavor independent \
                    --dart-define=endpoint="${CUSTOM_ENDPOINT}" \
                    --dart-define=cronetHttpNoPlay=true
                  cp build/app/outputs/flutter-apk/app-independent-debug.apk artifacts/ente-photos-custom-debug.apk

            - name: Build release independent APK
              if: env.BUILD_MODE == 'release'
              run: |
                  flutter build apk \
                    --release \
                    --flavor independent \
                    --target-platform android-arm,android-arm64 \
                    --dart-define=endpoint="${CUSTOM_ENDPOINT}" \
                    --dart-define=cronetHttpNoPlay=true
                  cp build/app/outputs/flutter-apk/app-independent-release.apk artifacts/ente-photos-custom-release.apk
              env:
                  SIGNING_KEY_PATH: ${{ runner.temp }}/ente_photos_key.jks
                  SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS_PHOTOS }}
                  SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD_PHOTOS }}
                  SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD_PHOTOS }}

            - name: Generate checksums
              run: sha256sum artifacts/*.apk > artifacts/sha256sum-apk

            - name: Upload APK artifact
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
              with:
                  name: photos-custom-${{ env.BUILD_MODE }}-android
                  path: mobile/apps/photos/artifacts/*
